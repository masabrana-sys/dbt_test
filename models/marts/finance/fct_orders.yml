models:
  - name: fct_orders
    config:
      group: finance
      access: public
      contract:
        enforced: true
    latest_version: 2
    columns:
      - name: order_id
        data_type: number
        constraints:
          - type: not_null
      - name: customer_id
        data_type: number
      - name: order_amount
        data_tests:
          - average_dollars_spent_greater_than_one:
              arguments:
                group_by_column: customer_id
        data_type: number
      - name: order_date
        data_type: date
    