models:
  - name: fct_orders
    config:
      group: finance
      access: public
      contract:
        enforced: true
    latest_version: 2
    columns:
      - name: order_id
        data_type: number
        constraints:
          - type: not_null
        entity:
          type: primary
          name: order
      - name: customer_id
        data_type: number
        entity:
          type: foreign
          name: customer
      - name: order_amount
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 5"
              config:
                severity: warn
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                row_condition: "order_id is not null"
                strictly: false
        data_type: number
      - name: order_date
        data_type: date
        dimension:
          type: time
        granularity: day
      - name: created_at
        data_type: date

        dimension:
          type: time
        granularity: day
    semantic_model:
      enabled: true
    metrics:
      - name: order_count
        agg: count
        expr: order_id
        type: simple
        hidden: true
      - name: total_revenue
        agg: sum
        expr: order_amount
        type: simple
        hidden: true
      - name: customer_order_count
        agg: count_distinct
        expr: order_id
        type: simple
        hidden: true
      - name: total_order_amount_per_customer
        label: Total Order Amount Per Customer
        type: derived
        type_params:
          expr: total_revenue / customer_order_count
          metrics:
            - name: total_revenue
            - name: customer_order_count
