models:
  - name: fct_orders
    config:
      group: finance
      access: public
      contract:
        enforced: true
    latest_version: 2
    columns:
      - name: order_id
        data_type: number
        constraints:
          - type: not_null
      - name: customer_id
        data_type: number
      - name: order_amount
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
          - dbt_expectations.expect_column_values_to_be_between: 
              arguments:             
                min_value: 0
                row_condition: "order_id is not null" 
                strictly: false
        data_type: number
      - name: order_date
        data_type: date
    